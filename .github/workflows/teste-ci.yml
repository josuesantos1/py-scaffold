name: Teste App - CI

permissions:
  contents: read

concurrency:
  group: teste-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'app/teste/**'
      - 'tests/teste/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/teste-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/teste/**'
      - 'tests/teste/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/teste-ci.yml'

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.teste }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            teste:
              - 'app/teste/**'
              - 'tests/teste/**'
              - 'pyproject.toml'
              - 'uv.lock'

  lint-and-test:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff lint
        run: uv run ruff check app/teste

      - name: Run Ruff format check
        run: uv run ruff format --check app/teste

      - name: Run Pyright
        run: uv run pyright app/teste

      - name: Run Bandit security check
        run: uv run bandit -r app/teste -ll

      - name: Run tests
        run: uv run pytest tests/teste -v --cov=app/teste --cov-report=term-missing --cov-fail-under=80
