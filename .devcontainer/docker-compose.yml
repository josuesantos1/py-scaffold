version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: fastapi-api
    command: ["uv", "run", "granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "8000", "main:app"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    networks:
      - backend
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace

  nginx:
    container_name: nginx
    depends_on:
      api:
        condition: service_started
    image: nginx:latest
    networks:
      - backend
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf

  postgres:
    container_name: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      retries: 5
      timeout: 5s
    image: postgres:16
    networks:
      - backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  prometheus:
    container_name: prometheus
    image: prom/prometheus
    networks:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

networks:
  backend:
    name: devcontainer_backend

volumes:
  postgres_data:
    name: devcontainer_postgres_data